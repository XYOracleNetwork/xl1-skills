# Monthly health check for PUBLIC_REPO_SYNC_TOKEN.
# Fine-grained PATs expire (max 1 year). If the sync PAT silently expires,
# sync-skills.yml will start failing on every release. This cron exercises
# the PAT against the target repo endpoint and opens a tracking issue if
# the call returns non-2xx, so a maintainer is paged before drift sets in.

name: PAT health check

on:
  schedule:
    - cron: '0 12 1 * *'  # 12:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  TARGET_REPO: XYOracleNetwork/xyo-skills

jobs:
  check:
    name: Probe sync PAT
    runs-on: ubuntu-latest
    steps:
      - name: Check token against target repo
        id: probe
        env:
          PAT: ${{ secrets.PUBLIC_REPO_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${PAT}" ]]; then
            echo "status=missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          http=$(curl -sS -o /tmp/body -w '%{http_code}' \
            -H "Authorization: token ${PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${TARGET_REPO}")
          echo "status=${http}" >> "$GITHUB_OUTPUT"
          if [[ "${http}" =~ ^2 ]]; then
            echo "PAT OK (HTTP ${http})"
          else
            echo "PAT probe failed (HTTP ${http}):"
            cat /tmp/body
          fi

      - name: Open tracking issue on failure
        if: steps.probe.outputs.status != '200'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATUS: ${{ steps.probe.outputs.status }}
        run: |
          set -euo pipefail
          title="PUBLIC_REPO_SYNC_TOKEN health check failed (status: ${STATUS})"
          existing=$(gh issue list --search "${title} in:title" --state open --json number --jq '.[0].number // ""')
          if [[ -n "${existing}" ]]; then
            echo "Existing issue #${existing} already open — skipping."
            exit 0
          fi
          gh issue create \
            --title "${title}" \
            --label "skills-sync" \
            --body "$(cat <<EOF
          The monthly PAT health check for the skills sync (\`.github/workflows/pat-health.yml\`) failed.

          - Target repo: \`${TARGET_REPO}\`
          - HTTP status from \`GET /repos/${TARGET_REPO}\`: **${STATUS}**

          ### Likely causes

          - The PAT expired (fine-grained PATs cap at 1 year).
          - The PAT was revoked.
          - The PAT's repository access was changed or the target repo was renamed.
          - The secret \`PUBLIC_REPO_SYNC_TOKEN\` is missing or empty.

          ### Fix

          See \`docs/sync-setup.md\` for the rotation procedure. Short version:

          1. Create a fresh fine-grained PAT scoped to \`${TARGET_REPO}\` with \`Contents: Read and write\`.
          2. Update the \`PUBLIC_REPO_SYNC_TOKEN\` repository secret.
          3. Re-run \`PAT health check\` from the Actions tab and confirm it passes.
          4. Close this issue.
          EOF
          )"
