# Sync `plugins/xl1-skills/skills/` to the public `XYOracleNetwork/xyo-skills` mirror
# so the skills are installable via `npx skills add XYOracleNetwork/xyo-skills`.
#
# Auth: requires repo secret `PUBLIC_REPO_SYNC_TOKEN` — a fine-grained Personal
# Access Token scoped to ONLY `XYOracleNetwork/xyo-skills` with `Contents: Read
# and write`. Do not use a classic `repo`-scoped PAT. See docs/sync-setup.md
# for step-by-step PAT creation and rotation procedure.
#
# The workflow performs no destructive action if validation fails or if the
# rsync produces no changes (idempotent). README.md and LICENSE at the target
# repo root are not touched — only the `skills/` subdirectory is mirrored.

name: Sync skills to xyo-skills

on:
  push:
    branches: [main]
    paths:
      - 'plugins/xl1-skills/skills/**'
      - 'scripts/validate-skills.mjs'
      - '.github/workflows/sync-skills.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Validate + compute diff but skip the push'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: sync-skills
  cancel-in-progress: false

env:
  TARGET_REPO: XYOracleNetwork/xyo-skills
  SOURCE_DIR: plugins/xl1-skills/skills

jobs:
  sync:
    name: Validate and mirror
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate skills
        run: node scripts/validate-skills.mjs "$SOURCE_DIR"

      - name: Clone target repo
        env:
          PAT: ${{ secrets.PUBLIC_REPO_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${PAT}" ]]; then
            echo "::error::PUBLIC_REPO_SYNC_TOKEN secret is not set. See docs/sync-setup.md."
            exit 1
          fi
          git clone --depth 1 "https://x-access-token:${PAT}@github.com/${TARGET_REPO}.git" target-mirror

      - name: Mirror and stage skills directory
        id: diff
        working-directory: target-mirror
        run: |
          set -euo pipefail
          mkdir -p skills
          rsync -a --delete --safe-links \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            "${GITHUB_WORKSPACE}/${SOURCE_DIR}/" skills/
          git add -A skills/
          if git diff --cached --quiet -- skills/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to sync."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Staged diff against target HEAD:"
            git diff --cached --stat -- skills/
          fi

      - name: Dry-run summary
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run == true
        working-directory: target-mirror
        run: |
          echo "::notice::dry_run=true — would push the staged diff above to ${TARGET_REPO}, but skipping."

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != true
        working-directory: target-mirror
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              -c commit.gpgsign=false \
              commit -m "chore: sync skills from xl1-skills@${GITHUB_SHA}"
          git push origin HEAD
